# Ensure cards.json is up to date with the MSE set and exported_cards/.
# If someone changes the .mse-set or exported_cards and forgets to run finalize (or generate_cards_json), this fails.
name: Check cards.json
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    if: false  # set to true to re-enable the cards.json check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate cards.json
        run: python generate_cards_json.py
      - name: Fail if cards.json is stale
        run: |
          if [ -n "$(git status --porcelain cards.json)" ]; then
            echo "::error::cards.json is out of date. Run 'python finalize.py' (or python generate_cards_json.py) and commit the updated file."
            git diff cards.json || true
            exit 1
          fi
