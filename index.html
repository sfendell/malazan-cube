<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Malazan Cube of the Fallen</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #1a1a1e;
      color: #e0e0e0;
      padding: 1rem;
    }
    .page { max-width: none; width: 100%; }
    h1 {
      text-align: center;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      margin: 0 0 0.5rem;
      letter-spacing: 0.02em;
    }
    .sub {
      text-align: center;
      margin-bottom: 1rem;
      opacity: 0.85;
    }
    .sub a { color: #7eb8da; }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
      padding: 0.75rem;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
    }
    .filters label { display: flex; align-items: center; gap: 0.5rem; }
    .filters select, .filters input[type="text"] {
      padding: 0.4rem 0.6rem;
      background: #2a2a2e;
      border: 1px solid #444;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 0.95rem;
    }
    .filters input[type="text"] { min-width: 180px; }
    .filters .checkbox-label { display: flex; align-items: center; gap: 0.35rem; white-space: nowrap; }
    .color-swatch { display: inline-flex; gap: 1px; }
    .color-swatch span {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      justify-items: center;
      width: 100%;
    }
    .card {
      display: block;
      width: 100%;
      max-width: 223px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    .card img {
      width: 100%;
      height: auto;
      vertical-align: middle;
    }
    .card-flip-wrapper {
      position: relative;
      display: block;
      width: 100%;
      max-width: 223px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      perspective: 800px;
    }
    .card-flip-wrapper:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    .card-flip-inner {
      position: relative;
      width: 100%;
      padding-bottom: 140%;
      transition: transform 0.5s ease;
      transform-style: preserve-3d;
    }
    .card-flip-wrapper.flipped .card-flip-inner {
      transform: rotateY(180deg);
    }
    .card-flip-front,
    .card-flip-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card-flip-front img,
    .card-flip-back img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: top;
    }
    .card-flip-back {
      transform: rotateY(180deg);
    }
    .card-flip-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.4rem 0.5rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      pointer-events: none;
      z-index: 2;
    }
    .card-flip-overlay svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .loading { text-align: center; padding: 3rem; }
    .error { text-align: center; padding: 2rem; color: #e88; }
    .no-results { text-align: center; padding: 2rem; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Malazan Cube of the Fallen</h1>
    <p class="sub">Card gallery · <a id="repo-link" href="#">Repository</a> · <a href="rules/">Rules</a></p>
    <div class="filters">
      <label>Color: <select id="color-filter"></select><span id="color-preview" class="color-swatch"></span></label>
      <label class="checkbox-label"><input type="checkbox" id="color-exact" checked> Match color identity exactly</label>
      <label>Type: <select id="type-filter"></select></label>
      <label>Text: <input type="text" id="text-filter" placeholder="Exact text in card…"></label>
    </div>
    <div id="gallery" class="gallery"></div>
    <div id="loading" class="loading">Loading cards…</div>
    <div id="no-results" class="no-results" style="display:none">No cards match the filters.</div>
    <div id="error" class="error" style="display:none"></div>
  </div>
  <script>
    (function () {
      var base = location.href.replace(/[^/]*$/, '');
      var pathParts = location.pathname.split('/').filter(Boolean);
      var repo = pathParts[0] || 'malazan-cube';
      var owner = location.hostname.split('.')[0];
      var repoLink = document.getElementById('repo-link');
      if (repoLink && owner && owner !== 'github') repoLink.href = 'https://github.com/' + owner + '/' + repo;
      var gallery = document.getElementById('gallery');
      var loading = document.getElementById('loading');
      var noResults = document.getElementById('no-results');
      var errEl = document.getElementById('error');

      var COLOR_MAP = {
        W: '#f0e6a2', U: '#b0d5e5', B: '#c4b4a4', R: '#e8a060', G: '#9acd82'
      };
      var COLOR_ORDER = [
        { key: '', name: 'All colors', colors: [] },
        { key: 'C', name: 'Colorless', colors: [] },
        { key: 'W', name: 'White', colors: ['W'] },
        { key: 'U', name: 'Blue', colors: ['U'] },
        { key: 'B', name: 'Black', colors: ['B'] },
        { key: 'R', name: 'Red', colors: ['R'] },
        { key: 'G', name: 'Green', colors: ['G'] },
        { key: 'WU', name: 'Azorius', colors: ['W','U'] },
        { key: 'UB', name: 'Dimir', colors: ['U','B'] },
        { key: 'BR', name: 'Rakdos', colors: ['B','R'] },
        { key: 'RG', name: 'Gruul', colors: ['R','G'] },
        { key: 'GW', name: 'Selesnya', colors: ['G','W'] },
        { key: 'WB', name: 'Orzhov', colors: ['W','B'] },
        { key: 'UR', name: 'Izzet', colors: ['U','R'] },
        { key: 'BG', name: 'Golgari', colors: ['B','G'] },
        { key: 'RW', name: 'Boros', colors: ['R','W'] },
        { key: 'GU', name: 'Simic', colors: ['G','U'] },
        { key: 'WUB', name: 'Esper', colors: ['W','U','B'] },
        { key: 'UBR', name: 'Grixis', colors: ['U','B','R'] },
        { key: 'BRG', name: 'Jund', colors: ['B','R','G'] },
        { key: 'RGW', name: 'Naya', colors: ['R','G','W'] },
        { key: 'GWU', name: 'Bant', colors: ['G','W','U'] },
        { key: 'WBG', name: 'Abzan', colors: ['W','B','G'] },
        { key: 'UWR', name: 'Jeskai', colors: ['U','W','R'] },
        { key: 'BUG', name: 'Sultai', colors: ['B','U','G'] },
        { key: 'RWB', name: 'Mardu', colors: ['R','W','B'] },
        { key: 'GUR', name: 'Temur', colors: ['G','U','R'] }
    ];

      function makeColorSwatch(colors) {
        var wrap = document.createElement('span');
        wrap.className = 'color-swatch';
        colors.forEach(function (c) {
          var s = document.createElement('span');
          s.style.background = COLOR_MAP[c] || '#666';
          wrap.appendChild(s);
        });
        return wrap;
      }

      function fillColorFilter() {
        var sel = document.getElementById('color-filter');
        COLOR_ORDER.forEach(function (o) {
          var opt = document.createElement('option');
          opt.value = o.key;
          opt.textContent = o.colors.length ? o.name + ' (' + o.colors.join('') + ')' : o.name;
          sel.appendChild(opt);
        });
        sel.addEventListener('change', updateColorPreview);
        updateColorPreview();
      }
      function updateColorPreview() {
        var key = document.getElementById('color-filter').value;
        var o = COLOR_ORDER.filter(function (x) { return x.key === key; })[0];
        var el = document.getElementById('color-preview');
        el.innerHTML = '';
        if (o && o.colors.length) o.colors.forEach(function (c) {
          var s = document.createElement('span');
          s.style.background = COLOR_MAP[c] || '#666';
          el.appendChild(s);
        });
      }

      var TYPE_ORDER = ['All types', 'Land', 'Instant', 'Sorcery', 'Creature', 'Artifact', 'Enchantment', 'Planeswalker', 'Battle', 'Other'];
      function fillTypeFilter() {
        var sel = document.getElementById('type-filter');
        TYPE_ORDER.forEach(function (t) {
          var opt = document.createElement('option');
          opt.value = t === 'All types' ? '' : t;
          opt.textContent = t;
          sel.appendChild(opt);
        });
      }

      var WUBRG = 'WUBRG';
      function normalizeColorKey(s) {
        if (!s || s === 'C') return s || '';
        return s.split('').sort(function (a, b) { return WUBRG.indexOf(a) - WUBRG.indexOf(b); }).join('');
      }
      function cardColors(card) {
        var c = card.colors != null ? card.colors : '';
        return c === '' ? 'C' : c;
      }
      function cardColorMatch(card, colorKey, exact) {
        if (!colorKey) return true;
        var c = cardColors(card);
        if (colorKey === 'C') return c === 'C';
        var cardNorm = normalizeColorKey(c === 'C' ? '' : c);
        var selNorm = normalizeColorKey(colorKey);
        if (exact) return cardNorm === selNorm;
        return selNorm.split('').every(function (letter) { return cardNorm.indexOf(letter) !== -1; });
      }

      var TYPE_KEYWORDS = ['Land', 'Instant', 'Sorcery', 'Creature', 'Artifact', 'Enchantment', 'Planeswalker', 'Battle'];
      function cardHasType(card, typeKey) {
        if (!typeKey) return true;
        var line = (card.typeLine != null ? card.typeLine : '').toLowerCase();
        if (typeKey === 'Other') {
          for (var i = 0; i < TYPE_KEYWORDS.length; i++) {
            if (line.indexOf(TYPE_KEYWORDS[i].toLowerCase()) !== -1) return false;
          }
          return true;
        }
        return line.indexOf(typeKey.toLowerCase()) !== -1;
      }

      function cardSearchText(card) {
        var name = (card.name != null ? card.name : card.img || '').replace(/\.png$/i, '');
        var text = card.text != null ? card.text : '';
        return (name + ' ' + text).toLowerCase();
      }

      function applyFilters(cards) {
        var colorKey = document.getElementById('color-filter').value;
        var colorExact = document.getElementById('color-exact').checked;
        var typeKey = document.getElementById('type-filter').value;
        var query = (document.getElementById('text-filter').value || '').trim().toLowerCase();
        return cards.filter(function (card) {
          if (colorKey !== '' && !cardColorMatch(card, colorKey, colorExact)) return false;
          if (typeKey !== '' && !cardHasType(card, typeKey)) return false;
          if (query !== '' && cardSearchText(card).indexOf(query) === -1) return false;
          return true;
        });
      }

      function renderCards(cards, flipMap) {
        gallery.innerHTML = '';
        noResults.style.display = 'none';
        var list = applyFilters(cards);
        if (list.length === 0) {
          noResults.style.display = 'block';
          return;
        }
        list.sort(function (a, b) {
          var na = (a.name != null ? a.name : a.img || '').replace(/\.png$/i, '');
          var nb = (b.name != null ? b.name : b.img || '').replace(/\.png$/i, '');
          return na.localeCompare(nb, undefined, { sensitivity: 'base' });
        });
        list.forEach(function (card) {
          var imgName = card.img != null ? card.img : (typeof card === 'string' ? card : card.name + '.png');
          var src = base + 'exported_cards/' + encodeURIComponent(imgName);
          var name = (card.name != null ? card.name : imgName).replace(/\.png$/i, '');
          var backName = flipMap && flipMap[name];

          if (backName) {
            var backSrc = base + 'exported_cards/' + encodeURIComponent(backName + '.png');
            var wrapper = document.createElement('div');
            wrapper.className = 'card-flip-wrapper';
            wrapper.title = name + ' (click to flip)';
            var inner = document.createElement('div');
            inner.className = 'card-flip-inner';
            var front = document.createElement('div');
            front.className = 'card-flip-front';
            var frontImg = document.createElement('img');
            frontImg.src = src;
            frontImg.loading = 'lazy';
            frontImg.alt = name;
            front.appendChild(frontImg);
            var back = document.createElement('div');
            back.className = 'card-flip-back';
            var backImg = document.createElement('img');
            backImg.src = backSrc;
            backImg.alt = backName;
            back.appendChild(backImg);
            var overlay = document.createElement('div');
            overlay.className = 'card-flip-overlay';
            overlay.innerHTML = 'FLIP OVER <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>';
            inner.appendChild(front);
            inner.appendChild(back);
            wrapper.appendChild(inner);
            wrapper.appendChild(overlay);
            wrapper.addEventListener('click', function (e) {
              e.preventDefault();
              wrapper.classList.toggle('flipped');
            });
            gallery.appendChild(wrapper);
          } else {
            var a = document.createElement('a');
            a.className = 'card';
            a.href = src;
            a.target = '_blank';
            a.rel = 'noopener';
            a.title = name;
            var img = document.createElement('img');
            img.src = src;
            img.loading = 'lazy';
            img.alt = name;
            a.appendChild(img);
            gallery.appendChild(a);
          }
        });
      }

      function normalizeCards(data) {
        if (!Array.isArray(data) || data.length === 0) return [];
        return data;
      }

      function showError(msg) {
        loading.style.display = 'none';
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }

      fillColorFilter();
      fillTypeFilter();
      var allCards = [];
      var flipCardsMap = {};

      function onFilterChange() {
        renderCards(allCards, flipCardsMap);
      }
      document.getElementById('color-filter').addEventListener('change', onFilterChange);
      document.getElementById('color-exact').addEventListener('change', onFilterChange);
      document.getElementById('type-filter').addEventListener('change', onFilterChange);
      document.getElementById('text-filter').addEventListener('input', onFilterChange);

      Promise.all([
        fetch('cards.json').then(function (r) {
          if (!r.ok) throw new Error(r.status);
          return r.json();
        }),
        fetch('flip-cards.json').then(function (r) {
          return r.ok ? r.json() : {};
        }).catch(function () { return {}; })
      ]).then(function (results) {
        loading.style.display = 'none';
        allCards = normalizeCards(results[0]);
        flipCardsMap = results[1] && typeof results[1] === 'object' ? results[1] : {};
        renderCards(allCards, flipCardsMap);
      }).catch(function () {
        loading.style.display = 'none';
        showError('Could not load cards.json. Make sure the file is in the same folder as index.html and you are viewing via GitHub Pages (not file://).');
      });
    })();
  </script>
</body>
</html>
