<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Malazan Cube of the Fallen</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #1a1a1e;
      color: #e0e0e0;
      padding: 1rem;
    }
    .page { max-width: none; width: 100%; }
    h1 {
      text-align: center;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      margin: 0 0 0.5rem;
      letter-spacing: 0.02em;
    }
    .sub {
      text-align: center;
      margin-bottom: 1.5rem;
      opacity: 0.85;
    }
    .sub a { color: #7eb8da; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      justify-items: center;
      width: 100%;
    }
    .card {
      display: block;
      width: 100%;
      max-width: 223px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    .card img {
      width: 100%;
      height: auto;
      vertical-align: middle;
    }
    .loading { text-align: center; padding: 3rem; }
    .error { text-align: center; padding: 2rem; color: #e88; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Malazan Cube of the Fallen</h1>
    <p class="sub">Card gallery · <a id="repo-link" href="#">Repository</a></p>
    <div id="gallery" class="gallery"></div>
    <div id="loading" class="loading">Loading cards…</div>
    <div id="error" class="error" style="display:none"></div>
  </div>
  <script>
    (function () {
      var base = location.href.replace(/[^/]*$/, '');
      var pathParts = location.pathname.split('/').filter(Boolean);
      var repo = pathParts[0] || 'malazan-cube';
      var owner = location.hostname.split('.')[0];
      var repoLink = document.getElementById('repo-link');
      if (repoLink && owner && owner !== 'github') repoLink.href = 'https://github.com/' + owner + '/' + repo;
      var gallery = document.getElementById('gallery');
      var loading = document.getElementById('loading');
      var errEl = document.getElementById('error');

      function showError(msg) {
        loading.style.display = 'none';
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }

      function render(cards) {
        loading.style.display = 'none';
        cards.sort(function (a, b) { return a.localeCompare(b, undefined, { sensitivity: 'base' }); });
        cards.forEach(function (name) {
          var src = base + 'exported_cards/' + encodeURIComponent(name);
          var a = document.createElement('a');
          a.className = 'card';
          a.href = src;
          a.target = '_blank';
          a.rel = 'noopener';
          a.title = name.replace(/\.png$/i, '');
          var img = document.createElement('img');
          img.src = src;
          img.loading = 'lazy';
          img.alt = name.replace(/\.png$/i, '');
          a.appendChild(img);
          gallery.appendChild(a);
        });
      }

      fetch(base + 'cards.json')
        .then(function (r) { return r.ok ? r.json() : Promise.reject(new Error('cards.json not found')); })
        .then(render)
        .catch(function () {
          if (owner === 'github') return showError('Could not load card list. Run generate-cards-json.ps1 and push cards.json.');
          fetch('https://api.github.com/repos/' + owner + '/' + repo + '/contents/exported_cards')
            .then(function (r) { return r.json(); })
            .then(function (data) {
              if (Array.isArray(data)) {
                var names = data.filter(function (x) { return x.name && /\.png$/i.test(x.name); }).map(function (x) { return x.name; });
                if (names.length) { return render(names); }
              }
              showError('Could not load card list. Push cards.json or enable GitHub Pages.');
            })
            .catch(function () { showError('Could not load card list. Run generate-cards-json.ps1 and push cards.json.'); });
        });
    })();
  </script>
</body>
</html>
