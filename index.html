<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Malazan Cube of the Fallen</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #1a1a1e;
      color: #e0e0e0;
      padding: 1rem;
    }
    .page { max-width: none; width: 100%; }
    h1 {
      text-align: center;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      margin: 0 0 0.5rem;
      letter-spacing: 0.02em;
    }
    .sub {
      text-align: center;
      margin-bottom: 1rem;
      opacity: 0.85;
    }
    .sub a { color: #7eb8da; }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
      padding: 0.75rem;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
    }
    .filters label { display: flex; align-items: center; gap: 0.5rem; }
    .filters select, .filters input[type="text"] {
      padding: 0.4rem 0.6rem;
      background: #2a2a2e;
      border: 1px solid #444;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 0.95rem;
    }
    .filters input[type="text"] { min-width: 180px; }
    .filters .checkbox-label { display: flex; align-items: center; gap: 0.35rem; white-space: nowrap; }
    .color-swatch { display: inline-flex; gap: 1px; }
    .color-swatch span {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      justify-items: center;
      width: 100%;
    }
    .card {
      display: block;
      width: 100%;
      max-width: 223px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    .card img {
      width: 100%;
      height: auto;
      vertical-align: middle;
    }
    .card-flip-wrapper {
      position: relative;
      display: block;
      width: 100%;
      max-width: 223px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      perspective: 800px;
    }
    .card-flip-wrapper:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    .card-flip-inner {
      position: relative;
      width: 100%;
      padding-bottom: 140%;
      transition: transform 0.5s ease;
      transform-style: preserve-3d;
    }
    .card-flip-wrapper.flipped .card-flip-inner {
      transform: rotateY(180deg);
    }
    .card-flip-front,
    .card-flip-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card-flip-front img,
    .card-flip-back img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: top;
    }
    .card-flip-back {
      transform: rotateY(180deg);
    }
    .card-flip-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.4rem 0.5rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      pointer-events: none;
      z-index: 2;
    }
    .card-flip-overlay svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .loading { text-align: center; padding: 3rem; }
    .error { text-align: center; padding: 2rem; color: #e88; }
    .no-results { text-align: center; padding: 2rem; opacity: 0.8; }
    .tabs { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 1px solid #444; }
    .tabs button {
      padding: 0.5rem 1rem;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #e0e0e0;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: -1px;
    }
    .tabs button:hover { color: #fff; }
    .tabs button.active { border-bottom-color: #7eb8da; color: #7eb8da; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card-cell { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 223px; }
    .card-cell .card-name {
      margin-top: 0.35rem;
      font-size: 0.8rem;
      text-align: center;
      color: rgba(255,255,255,0.9);
      line-height: 1.2;
      padding: 0 0.15rem;
    }
    .card-cell .card-name a { color: inherit; text-decoration: none; }
    .card-cell .card-name a:hover { text-decoration: underline; }
    .undraftables-section { margin-bottom: 2rem; }
    .undraftables-section h3 { margin: 0 0 0.75rem; font-size: 1.1rem; color: rgba(255,255,255,0.9); }
  </style>
</head>
<body>
  <div class="page">
    <h1>Malazan Cube of the Fallen</h1>
    <p class="sub">Card gallery · <a id="repo-link" href="#">Repository</a> · <a href="rules/">Rules</a></p>
    <div class="tabs">
      <button type="button" id="tab-draft" class="active">Draft</button>
      <button type="button" id="tab-undraftables">Undraftables</button>
    </div>
    <div id="panel-draft" class="panel active">
      <div class="filters">
        <label>Color: <select id="color-filter"></select><span id="color-preview" class="color-swatch"></span></label>
        <label class="checkbox-label"><input type="checkbox" id="color-exact" checked> Match color identity exactly</label>
        <label>Type: <select id="type-filter"></select></label>
        <label>Text: <input type="text" id="text-filter" placeholder="Exact text in card…"></label>
      </div>
      <div id="gallery" class="gallery"></div>
      <div id="loading" class="loading">Loading cards…</div>
      <div id="no-results" class="no-results" style="display:none">No cards match the filters.</div>
    </div>
    <div id="panel-undraftables" class="panel">
      <div id="undraftables-deck" class="undraftables-section"></div>
      <div id="undraftables-tokens" class="undraftables-section"></div>
      <div id="undraftables-souls" class="undraftables-section"></div>
    </div>
    <div id="error" class="error" style="display:none"></div>
    <div id="file-fallback" class="file-fallback" style="display:none">
      <p>Loading from <code>file://</code> is blocked by the browser. Load both data files from this folder:</p>
      <p><label>cards.json <input type="file" id="input-cards" accept=".json"></label></p>
      <p><label>flip-cards.json <input type="file" id="input-flip" accept=".json"></label></p>
    </div>
  </div>
  <style>
    .file-fallback { max-width: 480px; margin: 2rem auto; padding: 1rem; background: rgba(255,255,255,0.06); border-radius: 8px; }
    .file-fallback code { background: rgba(0,0,0,0.3); padding: 0.1em 0.3em; border-radius: 4px; }
    .file-fallback input[type="file"] { margin-left: 0.5rem; }
  </style>
  <script>
    (function () {
      var href = location.href.replace(/#.*$/, '').replace(/\?.*$/, '');
      var base = href.substring(0, href.lastIndexOf('/') + 1);
      var pathParts = location.pathname.split('/').filter(Boolean);
      var repo = pathParts[0] || 'malazan-cube';
      var owner = location.hostname.split('.')[0];
      var repoLink = document.getElementById('repo-link');
      if (repoLink && owner && owner !== 'github') repoLink.href = 'https://github.com/' + owner + '/' + repo;
      var gallery = document.getElementById('gallery');
      var loading = document.getElementById('loading');
      var noResults = document.getElementById('no-results');
      var errEl = document.getElementById('error');

      var COLOR_MAP = {
        W: '#f0e6a2', U: '#b0d5e5', B: '#c4b4a4', R: '#e8a060', G: '#9acd82'
      };
      var COLOR_ORDER = [
        { key: '', name: 'All colors', colors: [] },
        { key: 'C', name: 'Colorless', colors: [] },
        { key: 'W', name: 'White', colors: ['W'] },
        { key: 'U', name: 'Blue', colors: ['U'] },
        { key: 'B', name: 'Black', colors: ['B'] },
        { key: 'R', name: 'Red', colors: ['R'] },
        { key: 'G', name: 'Green', colors: ['G'] },
        { key: 'WU', name: 'Azorius', colors: ['W','U'] },
        { key: 'UB', name: 'Dimir', colors: ['U','B'] },
        { key: 'BR', name: 'Rakdos', colors: ['B','R'] },
        { key: 'RG', name: 'Gruul', colors: ['R','G'] },
        { key: 'GW', name: 'Selesnya', colors: ['G','W'] },
        { key: 'WB', name: 'Orzhov', colors: ['W','B'] },
        { key: 'UR', name: 'Izzet', colors: ['U','R'] },
        { key: 'BG', name: 'Golgari', colors: ['B','G'] },
        { key: 'RW', name: 'Boros', colors: ['R','W'] },
        { key: 'GU', name: 'Simic', colors: ['G','U'] },
        { key: 'WUB', name: 'Esper', colors: ['W','U','B'] },
        { key: 'UBR', name: 'Grixis', colors: ['U','B','R'] },
        { key: 'BRG', name: 'Jund', colors: ['B','R','G'] },
        { key: 'RGW', name: 'Naya', colors: ['R','G','W'] },
        { key: 'GWU', name: 'Bant', colors: ['G','W','U'] },
        { key: 'WBG', name: 'Abzan', colors: ['W','B','G'] },
        { key: 'UWR', name: 'Jeskai', colors: ['U','W','R'] },
        { key: 'BUG', name: 'Sultai', colors: ['B','U','G'] },
        { key: 'RWB', name: 'Mardu', colors: ['R','W','B'] },
        { key: 'GUR', name: 'Temur', colors: ['G','U','R'] }
    ];

      function makeColorSwatch(colors) {
        var wrap = document.createElement('span');
        wrap.className = 'color-swatch';
        colors.forEach(function (c) {
          var s = document.createElement('span');
          s.style.background = COLOR_MAP[c] || '#666';
          wrap.appendChild(s);
        });
        return wrap;
      }

      function fillColorFilter() {
        var sel = document.getElementById('color-filter');
        COLOR_ORDER.forEach(function (o) {
          var opt = document.createElement('option');
          opt.value = o.key;
          opt.textContent = o.colors.length ? o.name + ' (' + o.colors.join('') + ')' : o.name;
          sel.appendChild(opt);
        });
        sel.addEventListener('change', updateColorPreview);
        updateColorPreview();
      }
      function updateColorPreview() {
        var key = document.getElementById('color-filter').value;
        var o = COLOR_ORDER.filter(function (x) { return x.key === key; })[0];
        var el = document.getElementById('color-preview');
        el.innerHTML = '';
        if (o && o.colors.length) o.colors.forEach(function (c) {
          var s = document.createElement('span');
          s.style.background = COLOR_MAP[c] || '#666';
          el.appendChild(s);
        });
      }

      var TYPE_ORDER = ['All types', 'Land', 'Instant', 'Sorcery', 'Creature', 'Artifact', 'Enchantment', 'Planeswalker', 'Battle', 'Other'];
      function fillTypeFilter() {
        var sel = document.getElementById('type-filter');
        TYPE_ORDER.forEach(function (t) {
          var opt = document.createElement('option');
          opt.value = t === 'All types' ? '' : t;
          opt.textContent = t;
          sel.appendChild(opt);
        });
      }

      var WUBRG = 'WUBRG';
      function normalizeColorKey(s) {
        if (!s || s === 'C') return s || '';
        return s.split('').sort(function (a, b) { return WUBRG.indexOf(a) - WUBRG.indexOf(b); }).join('');
      }
      function cardColors(card) {
        var c = card.colors != null ? card.colors : '';
        return c === '' ? 'C' : c;
      }
      function cardColorMatch(card, colorKey, exact) {
        if (!colorKey) return true;
        var c = cardColors(card);
        if (colorKey === 'C') return c === 'C';
        var cardNorm = normalizeColorKey(c === 'C' ? '' : c);
        var selNorm = normalizeColorKey(colorKey);
        if (exact) return cardNorm === selNorm;
        return selNorm.split('').every(function (letter) { return cardNorm.indexOf(letter) !== -1; });
      }

      var TYPE_KEYWORDS = ['Land', 'Instant', 'Sorcery', 'Creature', 'Artifact', 'Enchantment', 'Planeswalker', 'Battle'];
      function cardHasType(card, typeKey) {
        if (!typeKey) return true;
        var line = (card.typeLine != null ? card.typeLine : '').toLowerCase();
        if (typeKey === 'Other') {
          for (var i = 0; i < TYPE_KEYWORDS.length; i++) {
            if (line.indexOf(TYPE_KEYWORDS[i].toLowerCase()) !== -1) return false;
          }
          return true;
        }
        return line.indexOf(typeKey.toLowerCase()) !== -1;
      }

      function cardSearchText(card) {
        var name = (card.name != null ? card.name : card.img || '').replace(/\.png$/i, '');
        var text = card.text != null ? card.text : '';
        return (name + ' ' + text).toLowerCase();
      }

      function applyFilters(cards) {
        var colorKey = document.getElementById('color-filter').value;
        var colorExact = document.getElementById('color-exact').checked;
        var typeKey = document.getElementById('type-filter').value;
        var query = (document.getElementById('text-filter').value || '').trim().toLowerCase();
        return cards.filter(function (card) {
          if (colorKey !== '' && !cardColorMatch(card, colorKey, colorExact)) return false;
          if (typeKey !== '' && !cardHasType(card, typeKey)) return false;
          if (query !== '' && cardSearchText(card).indexOf(query) === -1) return false;
          return true;
        });
      }

      /** Normalize for matching: lowercase, strip non-alphanumeric (handles apostrophe/punctuation differences). */
      function normalizeNameForMatch(s) {
        if (!s) return '';
        return String(s).toLowerCase().replace(/[^\w]/g, '');
      }

      /** Build maps so we can resolve a card name (with or without punctuation) to its img filename. */
      function buildNameToImg(cards) {
        var nameToImg = {};
        var stemToImg = {};
        var normToImg = {};
        cards.forEach(function (card) {
          var n = card.name != null ? card.name : (card.img || '').replace(/\.png$/i, '');
          var img = card.img != null ? card.img : (card.name || '') + '.png';
          if (n) nameToImg[n] = img;
          var stem = img.replace(/\.png$/i, '');
          if (stem) stemToImg[stem] = img;
          if (n) normToImg[normalizeNameForMatch(n)] = img;
          if (stem) normToImg[normalizeNameForMatch(stem)] = img;
        });
        return { nameToImg: nameToImg, stemToImg: stemToImg, normToImg: normToImg };
      }

      function resolveBackImg(backName, lookups) {
        if (!backName) return backName + '.png';
        return lookups.nameToImg[backName] || lookups.stemToImg[backName] || lookups.normToImg[normalizeNameForMatch(backName)] || (backName + '.png');
      }

      function isTokenCard(card) {
        return ((card.typeLine || '').trim().toLowerCase().indexOf('token') === 0);
      }

      var DECK_OF_DRAGONS_NAMES = [
        'Builder of High House Life',
        'Hunter of High House War',
        'King of High House Death',
        'Knight of High House Chains',
        'Magi of High House Chains',
        'Magi of High House Dark',
        'Mercenary of High House War',
        'Name to the Pantheon',
        'Priest of High House Light',
        'Queen of High House Shadow',
        'Scepter, Orb, and Throne',
        'The Obelisk',
        'Weaver of High House Life'
      ];
      var QUICK_BENS_SOULS_NAMES = [
        'Quick Ben, Burn\'s Adept',
        'Quick Ben, Denul Healer',
        'Quick Ben, Emurlahn Heretic',
        'Quick Ben, Hood\'s Disciple',
        'Quick Ben, Imperial Investigator',
        'Quick Ben, Ruse Master',
        'Quick Ben, Squad Mage',
        'Quick Ben, Tellan Wizard'
      ];

      function findCardByName(cards, name) {
        if (!name) return null;
        var norm = normalizeNameForMatch(name);
        for (var i = 0; i < cards.length; i++) {
          var c = cards[i];
          var n = c.name != null ? c.name : (c.img || '').replace(/\.png$/i, '');
          if (n === name || normalizeNameForMatch(n) === norm) return c;
        }
        return null;
      }

      function appendCardCell(container, cardEl, displayName, src) {
        var cell = document.createElement('div');
        cell.className = 'card-cell';
        cell.appendChild(cardEl);
        var caption = document.createElement('div');
        caption.className = 'card-name';
        var link = document.createElement('a');
        link.href = src;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = displayName;
        caption.appendChild(link);
        cell.appendChild(caption);
        container.appendChild(cell);
      }

      function renderUndraftablesSection(containerId, title, cardNamesOrList, cards, useNamesNotList) {
        var section = document.getElementById(containerId);
        section.innerHTML = '';
        var h3 = document.createElement('h3');
        h3.textContent = title;
        section.appendChild(h3);
        var gal = document.createElement('div');
        gal.className = 'gallery';
        section.appendChild(gal);
        var items = useNamesNotList ? cardNamesOrList : cardNamesOrList;
        if (useNamesNotList) {
          for (var i = 0; i < items.length; i++) {
            var card = findCardByName(cards, items[i]);
            if (!card) continue;
            var imgName = card.img != null ? card.img : (card.name || '') + '.png';
            var src = base + 'exported_cards/' + encodeURIComponent(imgName);
            var displayName = card.name != null ? card.name : imgName.replace(/\.png$/i, '');
            var a = document.createElement('a');
            a.className = 'card';
            a.href = src;
            a.target = '_blank';
            a.rel = 'noopener';
            a.title = displayName;
            var img = document.createElement('img');
            img.src = src;
            img.loading = 'lazy';
            img.alt = displayName;
            a.appendChild(img);
            appendCardCell(gal, a, displayName, src);
          }
        } else {
          items.forEach(function (card) {
            var imgName = card.img != null ? card.img : (card.name || '') + '.png';
            var src = base + 'exported_cards/' + encodeURIComponent(imgName);
            var displayName = card.name != null ? card.name : imgName.replace(/\.png$/i, '');
            var a = document.createElement('a');
            a.className = 'card';
            a.href = src;
            a.target = '_blank';
            a.rel = 'noopener';
            a.title = displayName;
            var img = document.createElement('img');
            img.src = src;
            img.loading = 'lazy';
            img.alt = displayName;
            a.appendChild(img);
            appendCardCell(gal, a, displayName, src);
          });
        }
      }

      function renderCards(cards, flipMap) {
        var deckSection = document.getElementById('undraftables-deck');
        var tokensSection = document.getElementById('undraftables-tokens');
        var soulsSection = document.getElementById('undraftables-souls');
        gallery.innerHTML = '';
        noResults.style.display = 'none';

        var backNamesNorm = new Set();
        if (flipMap && typeof flipMap === 'object') {
          Object.values(flipMap).forEach(function (v) { backNamesNorm.add(normalizeNameForMatch(v)); });
        }
        var undraftableNamesNorm = new Set(backNamesNorm);
        DECK_OF_DRAGONS_NAMES.forEach(function (n) { undraftableNamesNorm.add(normalizeNameForMatch(n)); });
        QUICK_BENS_SOULS_NAMES.forEach(function (n) { undraftableNamesNorm.add(normalizeNameForMatch(n)); });

        var list = applyFilters(cards);
        list = list.filter(function (card) {
          if (isTokenCard(card)) return false;
          var name = (card.name != null ? card.name : (card.img || '').replace(/\.png$/i, ''));
          return !undraftableNamesNorm.has(normalizeNameForMatch(name));
        });

        var tokenList = cards.filter(isTokenCard);
        tokenList.sort(function (a, b) {
          var na = (a.name != null ? a.name : a.img || '').replace(/\.png$/i, '');
          var nb = (b.name != null ? b.name : b.img || '').replace(/\.png$/i, '');
          return na.localeCompare(nb, undefined, { sensitivity: 'base' });
        });

        renderUndraftablesSection('undraftables-deck', 'Deck of Dragons', DECK_OF_DRAGONS_NAMES, cards, true);
        renderUndraftablesSection('undraftables-tokens', 'Tokens', tokenList, cards, false);
        renderUndraftablesSection('undraftables-souls', 'Quick Ben\'s Souls', QUICK_BENS_SOULS_NAMES, cards, true);

        if (list.length === 0) {
          noResults.style.display = 'block';
          return;
        }
        var lookups = buildNameToImg(cards);
        list.sort(function (a, b) {
          var na = (a.name != null ? a.name : a.img || '').replace(/\.png$/i, '');
          var nb = (b.name != null ? b.name : b.img || '').replace(/\.png$/i, '');
          return na.localeCompare(nb, undefined, { sensitivity: 'base' });
        });
        list.forEach(function (card) {
          var imgName = card.img != null ? card.img : (typeof card === 'string' ? card : card.name + '.png');
          var src = base + 'exported_cards/' + encodeURIComponent(imgName);
          var name = (card.name != null ? card.name : imgName).replace(/\.png$/i, '');
          var displayName = card.name != null ? card.name : name;
          var backName = flipMap && flipMap[name];

          if (backName) {
            var backImg = resolveBackImg(backName, lookups);
            var backSrc = base + 'exported_cards/' + encodeURIComponent(backImg);
            var wrapper = document.createElement('div');
            wrapper.className = 'card-flip-wrapper';
            wrapper.title = name + ' (click to flip)';
            var inner = document.createElement('div');
            inner.className = 'card-flip-inner';
            var front = document.createElement('div');
            front.className = 'card-flip-front';
            var frontImg = document.createElement('img');
            frontImg.src = src;
            frontImg.loading = 'lazy';
            frontImg.alt = name;
            front.appendChild(frontImg);
            var back = document.createElement('div');
            back.className = 'card-flip-back';
            var backImgEl = document.createElement('img');
            backImgEl.src = backSrc;
            backImgEl.alt = backName;
            back.appendChild(backImgEl);
            var overlay = document.createElement('div');
            overlay.className = 'card-flip-overlay';
            overlay.innerHTML = 'FLIP OVER <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>';
            inner.appendChild(front);
            inner.appendChild(back);
            wrapper.appendChild(inner);
            wrapper.appendChild(overlay);
            wrapper.addEventListener('click', function (e) {
              e.preventDefault();
              wrapper.classList.toggle('flipped');
            });
            appendCardCell(gallery, wrapper, displayName, src);
          } else {
            var a = document.createElement('a');
            a.className = 'card';
            a.href = src;
            a.target = '_blank';
            a.rel = 'noopener';
            a.title = name;
            var img = document.createElement('img');
            img.src = src;
            img.loading = 'lazy';
            img.alt = name;
            a.appendChild(img);
            appendCardCell(gallery, a, displayName, src);
          }
        });
      }

      function normalizeCards(data) {
        if (!Array.isArray(data) || data.length === 0) return [];
        return data;
      }

      function showError(msg) {
        loading.style.display = 'none';
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }

      fillColorFilter();
      fillTypeFilter();
      var allCards = [];
      var flipCardsMap = {};

      function onFilterChange() {
        renderCards(allCards, flipCardsMap);
      }
      document.getElementById('color-filter').addEventListener('change', onFilterChange);
      document.getElementById('color-exact').addEventListener('change', onFilterChange);
      document.getElementById('type-filter').addEventListener('change', onFilterChange);
      document.getElementById('text-filter').addEventListener('input', onFilterChange);

      document.getElementById('tab-draft').addEventListener('click', function () {
        document.getElementById('tab-draft').classList.add('active');
        document.getElementById('tab-undraftables').classList.remove('active');
        document.getElementById('panel-draft').classList.add('active');
        document.getElementById('panel-undraftables').classList.remove('active');
      });
      document.getElementById('tab-undraftables').addEventListener('click', function () {
        document.getElementById('tab-undraftables').classList.add('active');
        document.getElementById('tab-draft').classList.remove('active');
        document.getElementById('panel-undraftables').classList.add('active');
        document.getElementById('panel-draft').classList.remove('active');
      });

      function runWithData(cardsData, flipData) {
        loading.style.display = 'none';
        document.getElementById('file-fallback').style.display = 'none';
        errEl.style.display = 'none';
        allCards = normalizeCards(cardsData);
        flipCardsMap = flipData && typeof flipData === 'object' ? flipData : {};
        renderCards(allCards, flipCardsMap);
      }

      function tryFileFallback() {
        loading.style.display = 'none';
        errEl.style.display = 'none';
        var fallback = document.getElementById('file-fallback');
        fallback.style.display = 'block';
        var cardsRes = null;
        var flipRes = null;
        function maybeRun() {
          if (cardsRes != null && flipRes != null) runWithData(cardsRes, flipRes);
        }
        function readFile(file, cb) {
          var r = new FileReader();
          r.onload = function () { try { cb(JSON.parse(r.result)); } catch (e) { cb(null); } };
          r.readAsText(file);
        }
        document.getElementById('input-cards').onchange = function () {
          var f = this.files && this.files[0];
          if (f) readFile(f, function (data) { cardsRes = Array.isArray(data) ? data : null; maybeRun(); });
        };
        document.getElementById('input-flip').onchange = function () {
          var f = this.files && this.files[0];
          if (f) readFile(f, function (data) { flipRes = data && typeof data === 'object' ? data : null; maybeRun(); });
        };
      }

      Promise.all([
        fetch('cards.json').then(function (r) {
          if (!r.ok) throw new Error(r.status);
          return r.json();
        }),
        fetch('flip-cards.json').then(function (r) {
          return r.ok ? r.json() : {};
        }).catch(function () { return {}; })
      ]).then(function (results) {
        runWithData(results[0], results[1]);
      }).catch(function () {
        if (location.protocol === 'file:') {
          tryFileFallback();
        } else {
          loading.style.display = 'none';
          showError('Could not load cards.json. Make sure the file is in the same folder as index.html.');
        }
      });
    })();
  </script>
</body>
</html>
